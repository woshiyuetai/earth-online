<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <base href="./">
    <title>🌍 地球Online - 全球玩家评测站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #f0f0f0;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stats-badge {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-top: 15px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab {
            padding: 10px 22px;
            background: rgba(255,255,255,0.08);
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tab.active {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1a1a2e;
            font-weight: bold;
        }
        .rating-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .dimension {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .dimension label { font-weight: 600; width: 100px; }
        .star-group { display: flex; gap: 6px; }
        .star {
            font-size: 28px;
            cursor: pointer;
            color: #555;
            transition: 0.1s;
        }
        .star.selected { color: #FFD700; text-shadow: 0 0 5px #FFD700; }
        textarea, input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            color: white;
            font-size: 14px;
        }
        button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .review-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .review-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .author { font-weight: bold; color: #FFD700; }
        .score-badge {
            background: rgba(255,215,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: auto;
        }
        .review-dimensions {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 12px;
            color: #bbb;
            flex-wrap: wrap;
        }
        .review-content { line-height: 1.6; margin: 12px 0; }
        .review-footer {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        .delete-btn {
            background: rgba(255,0,0,0.2);
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            color: #ff6b6b;
        }
        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            z-index: 999;
            backdrop-filter: blur(5px);
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .loading, .empty-state { text-align: center; padding: 40px; color: #888; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .star { font-size: 22px; }
            .dimension label { width: 80px; font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌍 地球Online</h1>
        <p class="subtitle">🌐 全球玩家实时共享评测</p>
        <div class="stats-badge" id="statsBadge">📊 加载中...</div>
    </div>

    <div class="tabs" id="tabs">
        <div class="tab active" data-category="game">🎮 游戏总体</div>
        <div class="tab" data-category="china">🇨🇳 中国服</div>
        <div class="tab" data-category="job">💼 职业体验</div>
        <div class="tab" data-category="life">📚 人生阶段</div>
        <div class="tab" data-category="other">🌍 其他</div>
    </div>

    <div class="rating-card">
        <h3>✍️ 写下你的评测</h3>
        <div class="dimension"><label>⭐ 综合评分</label><div class="star-group" id="starOverall"></div></div>
        <div class="dimension"><label>🎨 画质/风景</label><div class="star-group" id="starGraphics"></div></div>
        <div class="dimension"><label>⚙️ 性能/健康</label><div class="star-group" id="starPerformance"></div></div>
        <div class="dimension"><label>💰 经济系统</label><div class="star-group" id="starEconomy"></div></div>
        <div class="dimension"><label>😊 社交体验</label><div class="star-group" id="starSocial"></div></div>
        <input type="text" id="playerName" placeholder="你的昵称（必填）" maxlength="20" style="margin-bottom: 15px;">
        <textarea id="commentText" rows="3" placeholder="分享你的地球Online游戏体验..."></textarea>
        <button id="submitBtn">🚀 发布评测（全球可见）</button>
    </div>

    <h3 style="margin: 20px 0 15px;">📢 全球玩家评测 <span id="reviewCount"></span></h3>
    <div id="reviewsList"><div class="loading">⏳ 加载评论中...</div></div>
</div>
<div class="admin-toggle" id="adminToggle">🔒 普通模式</div>

<script>
    // ==================== ⚠️ 请替换成你的 Supabase 配置 ====================
    const SUPABASE_URL = 'https://cmluvcvrcbynxrjzqmgh.supabase.co';  // 👈 改这里！
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtbHV2Y3ZyY2J5bnhyanpxbWdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDcyMjIsImV4cCI6MjA5MzcyMzIyMn0.1FZhErEflh3xk4eMPK7WVOMcHWE_ul_9QkiV_4nITQ0';  // 👈 改成你自己的 anon key
    // ====================================================================

    let currentCategory = "game";
    let scores = { overall: 5, graphics: 5, performance: 5, economy: 5, social: 5 };
    let isAdmin = false;
    let myUserUuid = null;

    // 生成或获取设备唯一标识
    function getMyUserUuid() {
        let uuid = localStorage.getItem("reviewer_uuid");
        if (!uuid) {
            uuid = crypto.randomUUID ? crypto.randomUUID() : Date.now() + "-" + Math.random().toString(36);
            localStorage.setItem("reviewer_uuid", uuid);
        }
        return uuid;
    }

    // 星星组件
    function initStarRating(containerId, scoreKey) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = "";
        for (let i = 1; i <= 10; i++) {
            const star = document.createElement("span");
            star.textContent = "☆";
            star.className = "star";
            if (i <= scores[scoreKey]) star.classList.add("selected");
            star.onclick = () => {
                scores[scoreKey] = i;
                updateAllStars();
            };
            container.appendChild(star);
        }
    }
    function updateAllStars() {
        const mappings = [
            { container: "starOverall", key: "overall" },
            { container: "starGraphics", key: "graphics" },
            { container: "starPerformance", key: "performance" },
            { container: "starEconomy", key: "economy" },
            { container: "starSocial", key: "social" }
        ];
        mappings.forEach(m => {
            const container = document.getElementById(m.container);
            if (!container) return;
            const stars = container.children;
            for (let i = 0; i < stars.length; i++) {
                const isSelected = (i + 1) <= scores[m.key];
                stars[i].textContent = isSelected ? "★" : "☆";
                if (isSelected) stars[i].classList.add("selected");
                else stars[i].classList.remove("selected");
            }
        });
    }

    // API 请求
    async function fetchReviews() {
        try {
            const url = `${SUPABASE_URL}/rest/v1/reviews?select=*&order=created_at.desc`;
            const res = await fetch(url, {
                headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if (!res.ok) throw new Error("fetch failed");
            return await res.json();
        } catch (e) { return []; }
    }

    async function fetchStats() {
        try {
            const url = `${SUPABASE_URL}/rest/v1/stats?select=*`;
            const res = await fetch(url, {
                headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
            });
            const data = await res.json();
            if (data && data[0]) return { total: data[0].total_reviews, avg: data[0].avg_score };
            return { total: 0, avg: 0 };
        } catch (e) { return { total: 0, avg: 0 }; }
    }

    async function postReview(review) {
        const url = `${SUPABASE_URL}/rest/v1/reviews`;
        const res = await fetch(url, {
            method: "POST",
            headers: {
                apikey: SUPABASE_ANON_KEY,
                Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(review)
        });
        return res.ok;
    }

    async function deleteReviewById(id) {
        const url = `${SUPABASE_URL}/rest/v1/reviews?id=eq.${id}`;
        const res = await fetch(url, {
            method: "DELETE",
            headers: {
                apikey: SUPABASE_ANON_KEY,
                Authorization: `Bearer ${SUPABASE_ANON_KEY}`
            }
        });
        return res.ok;
    }

    // 渲染评论
    async function renderReviews() {
        const container = document.getElementById("reviewsList");
        container.innerHTML = '<div class="loading">⏳ 加载中...</div>';
        const all = await fetchReviews();
        const filtered = all.filter(r => r.category === currentCategory);
        document.getElementById("reviewCount").innerText = `(${filtered.length}条)`;
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">🌱 暂无评测，写第一条吧！</div>';
            return;
        }
        container.innerHTML = filtered.map(r => {
            const canDelete = isAdmin || (myUserUuid && r.user_uuid === myUserUuid);
            return `
            <div class="review-card" data-id="${r.id}">
                <div class="review-header">
                    <div class="avatar">${getAvatarChar(r.player_name)}</div>
                    <span class="author">${escapeHtml(r.player_name)}</span>
                    <span class="score-badge">⭐ ${r.overall_score}.0</span>
                    ${canDelete ? `<button class="delete-btn" onclick="deleteReview(${r.id})">删除</button>` : ''}
                </div>
                <div class="review-dimensions">
                    <span>🎨 画质 ${r.graphics_score}⭐</span>
                    <span>⚙️ 性能 ${r.performance_score}⭐</span>
                    <span>💰 经济 ${r.economy_score}⭐</span>
                    <span>😊 社交 ${r.social_score}⭐</span>
                </div>
                <div class="review-content">${escapeHtml(r.content)}</div>
                <div class="review-footer">
                    <span>📅 ${new Date(r.created_at).toLocaleString()}</span>
                    <span>🏷️ ${getCategoryName(r.category)}</span>
                </div>
            </div>
        `}).join("");
    }

    window.deleteReview = async function(id) {
        if (!confirm("确定要删除这条评论吗？")) return;
        const ok = await deleteReviewById(id);
        if (ok) {
            alert("删除成功");
            await renderReviews();
            await updateStats();
        } else {
            alert("删除失败，请检查网络或权限");
        }
    };

    async function updateStats() {
        const stats = await fetchStats();
        const el = document.getElementById("statsBadge");
        if (stats.total === 0) el.innerHTML = "🎮 等待第一条评测";
        else el.innerHTML = `📊 ${stats.total}条评测 · 全球平均 ${stats.avg.toFixed(1)}⭐`;
    }

    async function publish() {
        const name = document.getElementById("playerName").value.trim();
        const content = document.getElementById("commentText").value.trim();
        if (!name || !content) { alert("请填写昵称和内容"); return; }
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerText = "⏳ 发布中...";
        const ok = await postReview({
            player_name: name,
            category: currentCategory,
            overall_score: scores.overall,
            graphics_score: scores.graphics,
            performance_score: scores.performance,
            economy_score: scores.economy,
            social_score: scores.social,
            content: content,
            user_uuid: myUserUuid
        });
        btn.disabled = false;
        btn.innerText = "🚀 发布评测（全球可见）";
        if (ok) {
            alert("✅ 发布成功！");
            document.getElementById("playerName").value = "";
            document.getElementById("commentText").value = "";
            scores = { overall: 5, graphics: 5, performance: 5, economy: 5, social: 5 };
            updateAllStars();
            await renderReviews();
            await updateStats();
        } else {
            alert("❌ 发布失败，请检查网络或 Supabase 配置");
        }
    }

    function getAvatarChar(name) {
        if (!name) return "👤";
        return name.charAt(0).toUpperCase();
    }
    function getCategoryName(cat) {
        const map = { game: "🎮 游戏总体", china: "🇨🇳 中国服", job: "💼 职业体验", life: "📚 人生阶段", other: "🌍 其他" };
        return map[cat] || cat;
    }
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        }).replace(/\n/g, "<br>");
    }

    // 初始化
    (async function init() {
        myUserUuid = getMyUserUuid();

        // 管理员开关
        const adminToggle = document.getElementById("adminToggle");
        if (localStorage.getItem("isAdmin") === "true") {
            isAdmin = true;
            adminToggle.innerText = "👑 管理员模式";
        }
        adminToggle.onclick = () => {
            if (!isAdmin) {
                let pwd = prompt("请输入管理员密码：");
                if (pwd === "3yuetai.") {   // 你可以修改这个密码
                    isAdmin = true;
                    localStorage.setItem("isAdmin", "true");
                    adminToggle.innerText = "👑 管理员模式";
                    renderReviews();
                } else {
                    alert("密码错误");
                }
            } else {
                isAdmin = false;
                localStorage.removeItem("isAdmin");
                adminToggle.innerText = "🔒 普通模式";
                renderReviews();
            }
        };

        initStarRating("starOverall", "overall");
        initStarRating("starGraphics", "graphics");
        initStarRating("starPerformance", "performance");
        initStarRating("starEconomy", "economy");
        initStarRating("starSocial", "social");
        await renderReviews();
        await updateStats();
        document.getElementById("submitBtn").onclick = publish;
        document.querySelectorAll(".tab").forEach(tab => {
            tab.onclick = async () => {
                document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                currentCategory = tab.dataset.category;
                await renderReviews();
            };
        });
    })();
</script>
</body>
</html>
